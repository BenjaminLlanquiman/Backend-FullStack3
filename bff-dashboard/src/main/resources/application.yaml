server:
  port: 8083

spring:
  application:
    name: bff-dashboard

# URLs de los microservicios
services:
  ventas-url: http://localhost:8081
  inventario-url: http://localhost:8082

# Circuit Breaker config
resilience4j:
  circuitbreaker:
    instances:
      ventas-cb:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
      inventario-cb:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2