server:
  port: ${PORT:8083}

spring:
  application:
    name: bff-dashboard

services:
  ventas-url: https://ms-ventas-2c24.onrender.com
  inventario-url: https://ms-inventario-ar3g.onrender.com

resilience4j:
  circuitbreaker:
    instances:
      ventas-cb:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
      inventario-cb:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2